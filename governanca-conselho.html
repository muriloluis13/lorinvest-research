<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conselho de Administração — mesa dinâmica</title>
<style>
  :root {
    --board-name: #1F3864;
    --board-role: #404040;
    --board-line: #2E5C8A;
    --board-font: "Segoe UI", Calibri, system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 24px;
    font-family: var(--board-font);
    background: #fff;
    color: #222;
  }

  /* ================= component ================= */
  .board {
    position: relative;
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
  }

  .board-stage {
    position: relative;
    width: 100%;
    height: 0;              /* height comes from padding-bottom (aspect box) */
    container-type: inline-size;
  }

  .board-stage > * { position: absolute; }

  .board-table { z-index: 1; }
  .board-logo  { z-index: 1; height: auto; background: #fff; }
  .board-seat  { z-index: 2; }

  .board-table, .board-seat, .board-logo { display: block; }

  .board-label {
    z-index: 3;
    display: flex;
    flex-direction: column;
    text-align: center;
    align-items: center;
    line-height: 1.16;
    /* Labels size themselves to the name, as in the deck, but stop before they
       run into the neighbouring seat: past that a long name wraps instead. */
    max-width: calc(var(--label-max) * 1cqw);
    overflow-wrap: break-word;
  }

  .board-label.is-side { max-width: calc(var(--label-max) * 1.2cqw); }

  .board-label .nm {
    font-weight: 700;
    color: var(--board-name);
    font-size: calc(var(--fs-name) * 1cqw);
  }

  .board-label .rl {
    font-style: italic;
    color: var(--board-role);
    font-size: calc(var(--fs-role) * 1cqw);
  }

  /* connector: dot + line */
  .board-conn { z-index: 2; display: flex; align-items: center; justify-content: center; }
  .board-conn i { display: block; background: var(--board-line); border-radius: 50%; flex: none; }
  .board-conn u { display: block; background: var(--board-line); text-decoration: none; flex: 1; }

  .board-label.is-side { text-align: left; align-items: flex-start; }
</style>
</head>

<script>
(function () {
  "use strict";

  // w/h of each figure, measured from the original art
  var ASPECT = {"table": 2.055, "a": 0.9891, "b": 1.0634, "c": 0.6962};

  /* Geometry model. Everything is expressed in "table heights" (H = 1).
     Ratios below were measured off the source deck and the art itself:
       h      - figure height as a fraction of the table height
       anchor - point along the figure's own height where the table edge
                crosses it. Putting that anchor on the table edge is what
                makes a figure read as "seated".
       headX  - where the head sits across the figure's own width. The art is
                not symmetric (a laptop or a notepad pushes the bounding box
                out to one side), so seats and labels line up on the head, not
                on the box. The deck does the same: its labels are centred on
                the head to within a hundredth of an inch. */
  var FIG = {
    a: { h: 0.5625, anchor: 0.372, headX: 0.615 },  // laptop
    b: { h: 0.5380, anchor: 0.446, headX: 0.263 },  // notepad, drawn already facing up
    c: { h: 0.4950, anchor: 0.408, headX: 0.436 }   // notepad, narrow
  };

  var PITCH        = 0.70;   // horizontal room per seat, in table heights
  var CONN         = 0.075;  // dot + line length
  var LABEL_RESERVE= 0.30;   // vertical room for a label (name may take 2 lines)
  var LABEL_MAX    = 1.25;   // widest a label gets, in seat pitches
  var LOGO_W       = 0.245;  // logo width as a fraction of the table width
  var LOGO_PAD     = 0.035;  // white margin around the logo
  var DOT          = 0.035;  // connector dot diameter
  var LINE         = 0.009;  // connector line thickness
  var FS_NAME      = 0.067;  // 10pt against a 2.08in table, in table heights
  var FS_ROLE      = 0.067;
  var SIDE_LABEL   = 0.85;   // room reserved to the right of a side seat

  function seatPlan(n) {
    // Mirrors how the source deck arranges each headcount:
    // 3->2/1  4->2/2  5->3/2  6->3/3  7->3/3+side  8->4/4  9->4/4+side
    if (n <= 0) return { top: 0, bottom: 0, side: 0 };
    if (n >= 7 && n % 2 === 1) return { top: (n - 1) / 2, bottom: (n - 1) / 2, side: 1 };
    return { top: Math.ceil(n / 2), bottom: Math.floor(n / 2), side: 0 };
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function render(root) {
    var members;
    try {
      members = JSON.parse(root.getAttribute("data-members") || "[]");
    } catch (e) {
      console.error("board: data-members não é JSON válido", e);
      return;
    }
    var n = members.length;
    if (!n) { root.innerHTML = ""; return; }

    var plan  = seatPlan(n);
    var perRow = Math.max(plan.top, plan.bottom);

    // Never squeeze the table below the aspect it was drawn at (it would look
    // stubby); past that, it just grows sideways to make room for more seats.
    var tableH = 1;
    var tableW = Math.max(ASPECT.table, perRow * PITCH);

    // vertical room a seated figure + its connector + label need, per side
    var padY = FIG.a.h * FIG.a.anchor + CONN + LABEL_RESERVE;

    // horizontal room: side seat needs figure + connector + its label
    var sideRoom = plan.side ? (FIG.c.h * (1 - FIG.c.anchor) + CONN + SIDE_LABEL) : 0;
    var padL = 0.30;
    var padR = Math.max(0.30, sideRoom);

    var stageW = tableW + padL + padR;
    var stageH = tableH + 2 * padY;

    var tableX = padL;
    var tableY = padY;

    var X = function (v) { return (v / stageW * 100) + "%"; };
    var Y = function (v) { return (v / stageH * 100) + "%"; };
    var C = function (v) { return (v / stageW * 100) + "cqw"; };  // length that must scale with width

    var h = [];
    h.push('<div class="board-stage" style="padding-bottom:' + (stageH / stageW * 100) + '%">');

    h.push('<svg class="board-table" viewBox="0 0 10 10" preserveAspectRatio="none" style="left:' +
      X(tableX) + ';top:' + Y(tableY) + ';width:' + X(tableW) + ';height:' + Y(tableH) +
      '"><use href="#fig-table" width="10" height="10"/></svg>');

    // optional logo, sitting on the table like in the deck (height follows the
    // image's own proportions, so any logo shape works)
    var logo = root.getAttribute("data-logo");
    if (logo) {
      h.push('<img class="board-logo" alt="" src="' + esc(logo) + '" style="left:' +
        X(tableX + tableW / 2) + ';top:' + Y(tableY + tableH / 2) + ';width:' + X(tableW * LOGO_W) +
        ';padding:' + C(LOGO_PAD) + ';transform:translate(-50%,-50%)">');
    }

    function figure(kind, x, y, w, fh, rot) {
      h.push('<svg class="board-seat" viewBox="0 0 10 10" preserveAspectRatio="none" style="left:' +
        X(x) + ';top:' + Y(y) + ';width:' + X(w) + ';height:' + Y(fh) +
        (rot ? ';transform:rotate(' + rot + 'deg)' : '') +
        '"><use href="#fig-' + kind + '" width="10" height="10"/></svg>');
    }

    function seat(kind, cx, edgeY, dir, m) {
      // dir: -1 seated at the table's top edge, +1 at the bottom edge
      var f  = FIG[kind];
      var fh = f.h;
      var w  = fh * ASPECT[kind];
      // figure "b" is already drawn facing up, the others are flipped for the bottom row
      var flip = dir > 0 && kind !== "b";
      // anchor measured from whichever end ends up nearest the table
      var headOff = (dir < 0) ? f.anchor : (1 - f.anchor);
      var y = edgeY - fh * headOff;
      // offset the figure so its head — not its bounding box — lands on the
      // seat centre; a 180deg flip mirrors where the head sits
      var headX = flip ? (1 - f.headX) : f.headX;
      figure(kind, cx - w * headX, y, w, fh, flip ? 180 : 0);

      var outY  = (dir < 0) ? y : y + fh;
      var connY = (dir < 0) ? outY - CONN : outY;
      h.push('<div class="board-conn" style="left:' + X(cx) + ';top:' + Y(connY) +
        ';width:0;height:' + Y(CONN) + ';flex-direction:' + (dir < 0 ? "column" : "column-reverse") +
        ';margin-left:' + C(-DOT / 2) + ';padding-left:' + C(DOT / 2) + '">' +
        '<i style="width:' + C(DOT) + ';height:' + C(DOT) + ';margin-left:' + C(-DOT / 2) + '"></i>' +
        '<u style="width:' + C(LINE) + ';margin-left:' + C(-LINE / 2) + '"></u></div>');

      // labels are auto-width and centred on the seat, exactly like the deck:
      // a long name simply reaches a little into its neighbour's column
      var pos = (dir < 0) ? 'bottom:' + Y(stageH - connY) : 'top:' + Y(connY + CONN);
      h.push('<div class="board-label" style="left:' + X(cx) + ';transform:translateX(-50%);' +
        pos + '"><span class="nm">' + esc(m.name) + '</span>' +
        (m.role ? '<span class="rl">' + esc(m.role) + '</span>' : '') + '</div>');
    }

    function sideSeat(m) {
      var f  = FIG.c;
      // the element is placed unrotated (w wide, fh tall) and spun about its
      // centre, so after the turn it reads fh wide by w tall
      var fh = f.h;                 // visual WIDTH after the +90deg rotation
      var w  = fh * ASPECT.c;       // visual HEIGHT after the rotation
      var cy = tableY + tableH / 2;
      var edgeX = tableX + tableW;

      // +90deg (clockwise) sends the figure's head to the right, so it sits
      // outside the table and reaches its notepad back onto it
      var cxFig = edgeX + fh * (f.anchor - 0.5);
      // the turn maps the head's sideways offset onto the vertical axis, so
      // correcting for it keeps the head level with the label
      var cyFig = cy + (0.5 - f.headX) * w;
      h.push('<svg class="board-seat" viewBox="0 0 10 10" preserveAspectRatio="none" style="left:' +
        X(cxFig - w / 2) + ';top:' + Y(cyFig - fh / 2) + ';width:' + X(w) + ';height:' + Y(fh) +
        ';transform:rotate(90deg);transform-origin:center' +
        '"><use href="#fig-c" width="10" height="10"/></svg>');

      // connector starts just clear of the head, mirroring the top/bottom seats
      var connX = edgeX + fh * f.anchor + 0.02;
      h.push('<div class="board-conn" style="left:' + X(connX) + ';top:' + Y(cy) +
        ';width:' + X(CONN) + ';height:0;flex-direction:row">' +
        '<i style="width:' + C(DOT) + ';height:' + C(DOT) + ';margin-top:' + C(-DOT / 2) + '"></i>' +
        '<u style="height:' + C(LINE) + ';margin-top:' + C(-LINE / 2) + '"></u></div>');

      h.push('<div class="board-label is-side" style="left:' + X(connX + CONN) + ';top:' + Y(cy) +
        ';transform:translateY(-50%)">' +
        '<span class="nm">' + esc(m.name) + '</span>' +
        (m.role ? '<span class="rl">' + esc(m.role) + '</span>' : '') + '</div>');
    }

    var i = 0;
    var topKinds = ["a", "c"];
    var botKinds = ["b", "a"];

    for (var t = 0; t < plan.top; t++) {
      seat(topKinds[t % 2], tableX + tableW * (t + 0.5) / plan.top, tableY, -1, members[i++]);
    }
    for (var b = 0; b < plan.bottom; b++) {
      seat(botKinds[b % 2], tableX + tableW * (b + 0.5) / plan.bottom, tableY + tableH, 1, members[i++]);
    }
    if (plan.side) sideSeat(members[i++]);

    h.push('</div>');
    root.innerHTML = h.join("");
    root.style.setProperty("--fs-name", FS_NAME / stageW * 100);
    root.style.setProperty("--fs-role", FS_ROLE / stageW * 100);
    root.style.setProperty("--label-max", PITCH * LABEL_MAX / stageW * 100);
  }

  function boot() {
    var list = document.querySelectorAll(".board");
    for (var i = 0; i < list.length; i++) render(list[i]);
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();

  window.renderBoards = boot;
})();
</script>
</body>
